<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #f5f5f5;
            color: #333;
        }
        .loader { text-align: center; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #ddd;
            border-top-color: #333;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        a { color: #0066cc; }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <p>Redirecting you now...</p>
        <p id="fallback" style="display:none;">
            If you are not redirected, <a id="fallback-link" href="https://inkripplestudio.vercel.app/welcome/coloring">click here</a>.
        </p>
    </div>

    <script>
        const DESTINATION = "https://inkripplestudio.vercel.app/welcome/coloring";

        setTimeout(() => {
            document.getElementById("fallback").style.display = "block";
        }, 3000);

        window.location.href = DESTINATION;
    </script>
</body>
</html>
